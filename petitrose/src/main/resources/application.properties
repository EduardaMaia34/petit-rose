spring.application.name=petitrose
# URL de conexão (substitui 'nome_do_banco' pelo nome da tua base de dados)
spring.datasource.url=jdbc:postgresql://localhost:5432/petit-rose-bd
spring.datasource.username=teu_usuario
spring.datasource.password=tua_senha

# Configurações adicionais recomendadas
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect