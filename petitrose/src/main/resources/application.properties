spring.application.name=petitrose

# Configurações do Banco de Dados (Conectando ao container Docker)
spring.datasource.url=jdbc:postgresql://localhost:5432/petitrose_db
spring.datasource.username=admin
spring.datasource.password=confeitaria
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurações do JPA / Hibernate
# 'update' cria as tabelas automaticamente com base nas suas classes Java (Entities)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Docker Compose Integration
# Garante que o Spring Boot espere o banco estar pronto antes de tentar conectar
spring.docker.compose.lifecycle-management=start-and-stop